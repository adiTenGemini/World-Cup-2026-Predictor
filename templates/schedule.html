<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>World Cup 2026 Schedule</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar" aria-label="Site header">
      <a class="brand brand-lockup" href="{{ url_for('index') }}" aria-label="World Cup 2026 Predictor home">
        <img
          src="{{ logo_url }}"
          alt=""
          class="brand-logo"
        />
        <span>World Cup 2026 Predictor</span>
      </a>
      <nav class="view-toggle" aria-label="Switch predictor view">
        <a href="{{ url_for('index') }}">Full</a>
        <a href="{{ url_for('guided') }}">Guided</a>
        <a href="{{ url_for('schedule') }}" aria-current="page">Schedule</a>
      </nav>
      <a
        class="github-link"
        href="https://github.com/adiTenGemini"
        aria-label="Open GitHub profile"
        title="GitHub profile"
        target="_blank"
        rel="noreferrer"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.5v-1.74c-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.95c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.95.68 1.91v2.83c0 .28.18.6.69.5A10.05 10.05 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z"
          />
        </svg>
      </a>
    </header>

    <main>
      <section class="schedule-hero" aria-labelledby="schedule-title">
        <img
          src="{{ logo_url }}"
          alt="FIFA World Cup 2026 logo"
          class="hero-logo"
        />
        <p class="kicker">104 matches</p>
        <h1 id="schedule-title">Tournament schedule</h1>
      </section>

      <section class="schedule-shell panel" aria-labelledby="schedule-list-title">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Fixtures</p>
            <h2 id="schedule-list-title">Full match list</h2>
          </div>
          <p id="schedule-count" class="schedule-count"></p>
        </div>

        <form class="schedule-filters" aria-label="Schedule filters">
          <label>
            <span>Stage</span>
            <select id="stage-filter">
              <option value="">All stages</option>
            </select>
          </label>
          <label>
            <span>Group</span>
            <select id="group-filter">
              <option value="">All groups</option>
            </select>
          </label>
          <label>
            <span>Venue</span>
            <select id="venue-filter">
              <option value="">All venues</option>
            </select>
          </label>
          <label class="search-filter">
            <span>Search</span>
            <input id="schedule-search" type="search" placeholder="Team, city, match..." />
          </label>
          <button id="clear-schedule-filters" class="ghost-button" type="button">Clear</button>
        </form>

        <div class="schedule-table-wrap">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>Match</th>
                <th>Date</th>
                <th>Time</th>
                <th>Stage</th>
                <th>Fixture</th>
                <th>Venue</th>
              </tr>
            </thead>
            <tbody id="schedule-body"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script>
      window.MATCH_SCHEDULE = {{ schedule | tojson }};
      window.SCHEDULE_FLAGS = {{ schedule_flags | tojson }};
    </script>
    <script src="{{ url_for('static', filename='schedule.js') }}"></script>
  </body>
</html>
