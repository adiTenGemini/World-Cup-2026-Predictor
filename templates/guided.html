<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Guided World Cup 2026 Predictor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Climate+Crisis:YEAR@1979&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <header class="topbar" aria-label="Site header">
      <a class="brand brand-lockup" href="{{ url_for('index') }}" aria-label="World Cup 2026 Predictor home">
        <img
          src="{{ logo_url }}"
          alt=""
          class="brand-logo"
        />
        <span>World Cup 2026 Predictor</span>
      </a>
      <nav class="view-toggle" aria-label="Switch predictor view">
        <a href="{{ url_for('index') }}">Full</a>
        <a href="{{ url_for('guided') }}" aria-current="page">Guided</a>
        <a href="{{ url_for('schedule') }}">Schedule</a>
      </nav>
      <a
        class="github-link"
        href="https://github.com/adiTenGemini"
        aria-label="Open GitHub profile"
        title="GitHub profile"
        target="_blank"
        rel="noreferrer"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path
            fill="currentColor"
            d="M12 2C6.48 2 2 6.58 2 12.26c0 4.52 2.87 8.35 6.84 9.7.5.1.68-.22.68-.5v-1.74c-2.78.62-3.37-1.37-3.37-1.37-.45-1.18-1.11-1.5-1.11-1.5-.91-.64.07-.63.07-.63 1 .07 1.53 1.06 1.53 1.06.9 1.57 2.35 1.12 2.92.86.09-.67.35-1.12.63-1.38-2.22-.26-4.56-1.14-4.56-5.06 0-1.12.39-2.03 1.03-2.75-.1-.26-.45-1.3.1-2.71 0 0 .84-.28 2.75 1.05A9.35 9.35 0 0 1 12 6.95c.85 0 1.7.12 2.5.34 1.9-1.33 2.74-1.05 2.74-1.05.55 1.41.2 2.45.1 2.71.64.72 1.03 1.63 1.03 2.75 0 3.93-2.34 4.8-4.57 5.05.36.32.68.95.68 1.91v2.83c0 .28.18.6.69.5A10.05 10.05 0 0 0 22 12.26C22 6.58 17.52 2 12 2Z"
          />
        </svg>
      </a>
    </header>

    <main>
      <section class="guided-hero" aria-labelledby="guided-title">
        <img
          src="{{ logo_url }}"
          alt="FIFA World Cup 2026 logo"
          class="hero-logo"
        />
        <p class="kicker">Step-by-step mode</p>
        <h1 id="guided-title">Complete one stage at a time</h1>
        <p>
          Rank each group, choose the eight best third-place teams, then pick
          winners round by round until the champion is decided. Knockout
          probabilities use a recency-weighted Elo model.
        </p>
      </section>

      <section class="guided-shell">
        <aside class="stepper" aria-label="Prediction steps">
          <ol id="stepper-list"></ol>
        </aside>

        <section class="panel guided-panel" aria-live="polite">
          <div class="section-heading">
            <div>
              <p id="guided-kicker" class="eyebrow"></p>
              <h2 id="guided-heading"></h2>
            </div>
            <div class="button-row">
              <button id="guided-simulate" class="primary-button" type="button">Simulate all</button>
              <button id="guided-reset" class="ghost-button" type="button">Reset</button>
            </div>
          </div>

          <div id="guided-content"></div>

          <footer class="guided-actions">
            <button id="back-step" class="ghost-button" type="button">Back</button>
            <p id="step-message" class="step-message"></p>
            <button id="next-step" class="primary-button" type="button">Next</button>
          </footer>
        </section>
      </section>
    </main>

    <script>
      window.WORLD_CUP_GROUPS = {{ groups | tojson }};
    </script>
    <script src="{{ url_for('static', filename='guided.js') }}"></script>
  </body>
</html>
